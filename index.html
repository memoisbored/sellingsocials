<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Marketplace de Cuentas</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 8px; box-shadow: 2px 2px 5px #ccc; }
    </style>
</head>
<body>
    <h1>Cuentas en Venta</h1>
    <div id="lista-cuentas">Cargando cuentas...</div>

    <script>
        // Definimos la variable directamente dentro del script
        var url = 'https://script.google.com/macros/s/AKfycbx3V4ZYfdtzUrxDtjv_d60VMFNhNuzfIb9UqKPN548ArndkdBAKgMKez9rtc87sMyWZwA/exec';
        
        fetch(url)
            .then(res => res.json())
            .then(data => {
                var contenedor = document.getElementById('lista-cuentas');
                contenedor.innerHTML = '';
                // data.slice(1) salta la fila de encabezados
                data.slice(1).forEach(function(row) {
                    contenedor.innerHTML += '<div class="card">' +
                        '<p><strong>Red:</strong> ' + row[1] + ' | <strong>Seguidores:</strong> ' + row[2] + ' | <strong>Precio:</strong> $' + row[3] + '</p>' +
                        '</div>';
                });
            })
            .catch(function(error) {
                console.error("Error:", error);
                document.getElementById('lista-cuentas').innerHTML = "Hubo un error al cargar. Revisa la consola.";
            });
    </script>
</body>
</html>
